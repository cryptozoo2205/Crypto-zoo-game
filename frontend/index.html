<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Crypto Zoo</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <div class="app-shell">
        <h1>Crypto Zoo 🐾</h1>

        <div class="stats">
            <div>Monety: <span id="coins-count">0</span></div>
            <div>Poziom: <span id="level">1</span></div>
            <div>Za klik: <span id="coins-per-click">1</span></div>
        </div>

        <div id="toast" class="toast"></div>

        <section id="game" class="screen active-screen">
            <div class="screen-card center-card">
                <div class="tap-wrapper">
                    <button id="tap-btn" type="button">UZYSKAJ MONETY</button>
                    <div id="coin-animation-container"></div>
                </div>
            </div>
        </section>

        <section id="zoo" class="screen">
            <div class="screen-card">
                <h3 class="section-title">🐾 Zoo</h3>

                <div class="animal-row">
                    <div class="animal-left">
                        <div class="animal-icon">🐵</div>
                        <div class="animal-text">
                            <div class="animal-name">Małpa</div>
                            <div class="animal-desc">Dochód: +1 / sek • Koszt: 100</div>
                        </div>
                    </div>
                    <button id="buy-monkey-btn" type="button">Kup</button>
                </div>

                <div class="animal-row">
                    <div class="animal-left">
                        <div class="animal-icon">🐼</div>
                        <div class="animal-text">
                            <div class="animal-name">Panda</div>
                            <div class="animal-desc">Dochód: +3 / sek • Koszt: 400</div>
                        </div>
                    </div>
                    <button id="buy-panda-btn" type="button">Kup</button>
                </div>

                <div class="animal-row">
                    <div class="animal-left">
                        <div class="animal-icon">🦁</div>
                        <div class="animal-text">
                            <div class="animal-name">Lew</div>
                            <div class="animal-desc">Dochód: +8 / sek • Koszt: 1200</div>
                        </div>
                    </div>
                    <button id="buy-lion-btn" type="button">Kup</button>
                </div>

                <div class="info-box">
                    Dochód zoo: <span id="zoo-income">0</span>
                </div>
            </div>
        </section>

        <section id="shop" class="screen">
            <div class="screen-card">
                <h3 class="section-title">🛒 Sklep</h3>

                <div class="shop-row">
                    <div class="shop-text">
                        <div class="shop-title">Upgrade kliknięcia</div>
                        <div class="shop-desc">Zwiększa liczbę monet za klik o +1</div>
                    </div>
                    <button id="buy-upgrade-btn" type="button">Kup</button>
                </div>

                <div class="info-box">
                    Koszt ulepszenia: <span id="upgrade-cost">50</span>
                </div>
            </div>
        </section>

        <section id="ranking" class="screen">
            <div class="screen-card">
                <h3 class="section-title">🏆 Ranking</h3>
                <ul id="ranking-list" class="ranking-list"></ul>
            </div>
        </section>
    </div>

    <nav class="bottom-menu">
        <button class="nav-btn" data-screen="game" type="button">
            <span class="nav-icon">🏠</span>
            <span class="nav-text">Gra</span>
        </button>

        <button class="nav-btn" data-screen="zoo" type="button">
            <span class="nav-icon">🐾</span>
            <span class="nav-text">Zoo</span>
        </button>

        <button class="nav-btn" data-screen="shop" type="button">
            <span class="nav-icon">🛒</span>
            <span class="nav-text">Sklep</span>
        </button>

        <button class="nav-btn" data-screen="ranking" type="button">
            <span class="nav-icon">🏆</span>
            <span class="nav-text">Ranking</span>
        </button>
    </nav>

    <script src="game.js"></script>
</body>
</html>
