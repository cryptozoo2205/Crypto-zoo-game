<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Crypto Zoo</title>

  <script src="https://telegram.org/js/telegram-web-app.js"></script>

  <link rel="stylesheet" href="css/base.css" />
  <link rel="stylesheet" href="css/layout.css" />
  <link rel="stylesheet" href="css/game.css" />
  <link rel="stylesheet" href="css/zoo.css" />
  <link rel="stylesheet" href="css/shop.css" />
  <link rel="stylesheet" href="css/ranking.css" />
  <link rel="stylesheet" href="css/menu.css" />
  <link rel="stylesheet" href="css/responsive.css" />
  <link rel="stylesheet" href="css/expeditions.css" />
</head>
<body>
  <div class="app-shell">
    <header class="top-hero">
      <div class="hero-overlay"></div>
      <div class="hero-content">
        <h1>Crypto Zoo</h1>
        <div class="paw-deco">🐾 🐾 🐾</div>

        <div class="stats-panel">
          <div class="stat-card">
            <div class="stat-label">Monety</div>
            <div class="stat-value" id="coins-count">0</div>
          </div>

          <div class="stat-card">
            <div class="stat-label">Gems</div>
            <div class="stat-value" id="gems-count">0</div>
          </div>

          <div class="stat-card">
            <div class="stat-label">Poziom</div>
            <div class="stat-value" id="level">1</div>
          </div>

          <div class="stat-card">
            <div class="stat-label">Za klik</div>
            <div class="stat-value" id="coins-per-click">1</div>
          </div>
        </div>
      </div>
    </header>

    <div id="toast" class="toast"></div>

    <section id="game" class="screen active-screen">
      <div class="screen-card game-screen-card">
        <div class="game-main-panel">
          <div class="tap-ring-wrap">
            <img class="tap-ring-img" src="assets/effects/glow_circle.png" alt="" />
            <button id="tap-btn" type="button" aria-label="Uzyskaj monety">
              <span class="tap-paw-icon">🐾</span>
            </button>
            <div id="coin-animation-container"></div>
          </div>

          <div class="tap-title">UZYSKAJ MONETY</div>

          <div class="income-bar">
            <div class="income-box">
              <div class="income-label">Dochód zoo / sek</div>
              <div class="income-value" id="zoo-income">0</div>
            </div>

            <div class="income-box">
              <div class="income-label">Łącznie zwierząt</div>
              <div class="income-value" id="animals-total">0</div>
            </div>
          </div>
        </div>
      </div>
    </section>

    <section id="zoo" class="screen">
      <div class="screen-card zoo-screen-card">
        <h3 class="section-title">🐾 Zoo Collection</h3>
        <div id="zoo-list"></div>
      </div>
    </section>

    <section id="expeditions" class="screen">
      <div class="screen-card expeditions-screen-card">
        <h3 class="section-title">🧭 Ekspedycje</h3>

        <div id="expedition-active-box" class="expedition-active-box"></div>

        <div id="expedition-list" class="expedition-list"></div>
      </div>
    </section>

    <section id="shop" class="screen">
      <div class="screen-card premium-card">
        <h3 class="section-title">🛒 Sklep</h3>

        <div class="shop-row">
          <div class="shop-text">
            <div class="shop-title">Upgrade kliknięcia</div>
            <div class="shop-desc">Zwiększa liczbę monet za klik o +1</div>
          </div>
          <button id="buy-upgrade-btn" type="button">Kup</button>
        </div>

        <div class="info-box">
          Koszt ulepszenia: <span id="upgrade-cost">50</span>
        </div>
      </div>
    </section>

    <section id="ranking" class="screen">
      <div class="screen-card premium-card">
        <h3 class="section-title">🏆 Ranking</h3>
        <ul id="ranking-list" class="ranking-list"></ul>
      </div>
    </section>
  </div>

  <nav class="bottom-menu five-menu">
    <button class="nav-btn active-nav" data-screen="game" type="button">
      <img class="nav-icon-img" src="assets/menu/icon_game.png" alt="Gra" />
      <span class="nav-text">Gra</span>
    </button>

    <button class="nav-btn" data-screen="zoo" type="button">
      <img class="nav-icon-img" src="assets/menu/icon_zoo.png" alt="Zoo" />
      <span class="nav-text">Zoo</span>
    </button>

    <button class="nav-btn" data-screen="expeditions" type="button">
      <span class="nav-emoji">🧭</span>
      <span class="nav-text">Misje</span>
    </button>

    <button class="nav-btn" data-screen="shop" type="button">
      <img class="nav-icon-img" src="assets/menu/icon_shop.png" alt="Sklep" />
      <span class="nav-text">Sklep</span>
    </button>

    <button class="nav-btn" data-screen="ranking" type="button">
      <img class="nav-icon-img" src="assets/menu/icon_ranking.png" alt="Ranking" />
      <span class="nav-text">Ranking</span>
    </button>
  </nav>

  <script src="js/state.js"></script>
  <script src="js/config.js"></script>
  <script src="js/telegram.js"></script>
  <script src="js/dom.js"></script>
  <script src="js/api.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/gameplay.js"></script>
  <script src="js/init.js"></script>
</body>
</html>
