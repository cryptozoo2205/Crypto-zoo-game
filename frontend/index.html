<!DOCTYPE html>
<html lang="pl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Crypto Zoo</title>

<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/zoo.css">
<link rel="stylesheet" href="css/shop.css">

</head>


<body>

<div id="app">

<header class="top-bar">

<div class="balance">
Coins
<span id="coins">0</span>
</div>

<div class="balance">
Gems
<span id="gems">0</span>
</div>

<div class="balance">
Reward
<span id="rewardBalance">0</span>
</div>

</header>


<main id="game">

<section id="screen-game">

<div class="tap-area">

<button id="tapButton">
🐾
</button>

</div>

</section>


<section id="screen-zoo" class="hidden">

<h2>Zoo</h2>

<div id="zooList"></div>

</section>


<section id="screen-shop" class="hidden">

<h2>Shop</h2>

<div id="shopList"></div>

<h3>Boxes</h3>

<div class="boxes">

<button data-box-type="common">
Common Box
<br>
1000 coins
</button>

<button data-box-type="rare">
Rare Box
<br>
5 gems
</button>

<button data-box-type="epic">
Epic Box
<br>
15 gems
</button>

<button data-box-type="legendary">
Legendary Box
<br>
40 gems
</button>

</div>

</section>


<section id="screen-missions" class="hidden">

<h2>Expeditions</h2>

<div id="missionsList"></div>

</section>


<section id="screen-ranking" class="hidden">

<h2>Ranking</h2>

<ul id="rankingList"></ul>

</section>

</main>


<footer class="menu">

<button data-nav="game">
Game
</button>

<button data-nav="zoo">
Zoo
</button>

<button data-nav="shop">
Shop
</button>

<button data-nav="missions">
Missions
</button>

<button data-nav="ranking">
Ranking
</button>

</footer>


</div>


<!-- SCRIPTS -->

<script src="js/config.js"></script>
<script src="js/state.js"></script>
<script src="js/dom.js"></script>
<script src="js/ui.js"></script>
<script src="js/api.js"></script>
<script src="js/telegram.js"></script>

<script src="js/shop.js"></script>
<script src="js/boxes.js"></script>

<script src="js/gameplay.js"></script>

<script src="js/init.js"></script>

</body>

</html>
