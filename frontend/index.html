<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    >
    <meta name="theme-color" content="#0b1220">
    <title>Crypto Zoo</title>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>

    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/game.css">
    <link rel="stylesheet" href="css/zoo.css">
    <link rel="stylesheet" href="css/shop.css">
    <link rel="stylesheet" href="css/expeditions.css">
    <link rel="stylesheet" href="css/ranking.css">
    <link rel="stylesheet" href="css/menu.css">
    <link rel="stylesheet" href="css/minigames-ui.css">
    <link rel="stylesheet" href="css/responsive.css">

    <style>
        html, body {
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden;
            background: #0b1220;
        }

        #app {
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        #game {
            width: 100%;
            height: calc(100% - 110px);
            overflow-y: auto;
        }

        .menu {
            height: 110px;
            display: flex;
            justify-content: space-around;
            align-items: center;
        }
    </style>
</head>

<body>
    <div id="app">
        <header class="top-bar">
            <button id="topProfileBtn">Profile</button>
        </header>

        <main id="game"></main>

        <footer class="menu">
            <button class="menu-btn" data-nav="game">Game</button>
            <button class="menu-btn" data-nav="zoo">Zoo</button>
            <button class="menu-btn" data-nav="shop">Shop</button>
            <button class="menu-btn" data-nav="missions">Missions</button>
            <button class="menu-btn" data-nav="minigames">Mini</button>
            <button class="menu-btn" data-nav="ranking">Ranking</button>
        </footer>
    </div>

    <!-- 🔥 KOLEJNOŚĆ JEST KLUCZOWA -->
    <script src="./js/config.js"></script>
    <script src="./js/state.js"></script>
    <script src="./js/dom.js"></script>

    <script src="./js/lang.js"></script>

    <script src="./js/ui.js"></script>
    <script src="./js/ui-profile.js"></script>
    <script src="./js/ui-settings.js"></script>
    <script src="./js/ui-ranking.js"></script>
    <script src="./js/ui-faq.js"></script>

    <script src="./js/navigation-system.js"></script>
    <script src="./js/gameplay.js"></script>
    <script src="./js/animal-system.js"></script>
    <script src="./js/expedition-system.js"></script>
    <script src="./js/income-system.js"></script>
    <script src="./js/offline-system.js"></script>

    <script src="./js/api.js"></script>

    <!-- DEPOSIT -->
    <script src="./js/deposit-ui.js"></script>

    <script src="./js/telegram.js"></script>
    <script src="./js/audio.js"></script>
    <script src="./js/shop.js"></script>
    <script src="./js/minigames.js"></script>

    <script src="./js/init.js"></script>
</body>
</html>
