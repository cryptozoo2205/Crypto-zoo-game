<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    >
    <meta name="theme-color" content="#0b1220">
    <title>Crypto Zoo</title>

    <script src='//libtl.com/sdk.js' data-zone='10822070' data-sdk='show_10822070'></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>

    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/game.css">
    <link rel="stylesheet" href="css/zoo.css">
    <link rel="stylesheet" href="css/shop.css">
    <link rel="stylesheet" href="css/expeditions.css">
    <link rel="stylesheet" href="css/ranking.css">
    <link rel="stylesheet" href="css/menu.css">
    <link rel="stylesheet" href="css/minigames-ui.css">
    <link rel="stylesheet" href="css/responsive.css">

    <style>
        :root { --menu-height: 110px; }

        html, body {
            width: 100%;
            height: 100%;
            min-height: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden;
            background: #0b1220;
        }

        body.telegram-webapp {
            overscroll-behavior: none;
            touch-action: manipulation;
        }

        #app {
            width: 100%;
            height: 100%;
            min-height: 100%;
            overflow: hidden;
            background: #0b1220;
        }

        #game {
            width: 100%;
            overflow-y: auto;
            overflow-x: hidden;
            -webkit-overflow-scrolling: touch;
            box-sizing: border-box;
        }

        .top-bar {
            padding-top: env(safe-area-inset-top, 0px);
            box-sizing: border-box;
        }

        .menu {
            padding-bottom: max(10px, env(safe-area-inset-bottom, 0px));
            box-sizing: border-box;
        }

        #loading-screen {
            position: fixed;
            inset: 0;
            z-index: 9999;
        }
    </style>
</head>

<body>

<div id="loading-screen">
    <div class="loading-visual">
        <div class="loading-image-wrap">
            <img src="assets/loading/loading_main.png" class="loading-image">
            <div class="loading-progress-overlay">
                <div class="loading-progress-bar">
                    <div class="loading-progress-fill" id="loadingBarFill"></div>
                </div>
                <div class="loading-progress-text" id="loadingPercent">0%</div>
            </div>
        </div>
    </div>
</div>

<div id="app">
    <header class="top-bar">
        <div class="top-bar-shell">
            <div class="top-bar-main">
                <div class="top-bar-left">
                    <button class="top-profile-trigger" id="topProfileBtn">
                        <div class="top-avatar"></div>
                        <span class="top-profile-ring"></span>
                    </button>

                    <div class="top-user-meta">
                        <div class="top-user-name" id="topPlayerName">Crypto Zoo</div>
                        <div class="top-user-status" id="topPlayerStatus">● Online</div>
                    </div>
                </div>

                <div class="top-bar-overlay-actions">
                    <button class="top-icon-chip">✦</button>
                    <button class="top-icon-chip" id="topSettingsBtn">⚙</button>
                </div>
            </div>
        </div>
    </header>

    <main id="game"></main>

    <footer class="menu">
        <button class="menu-btn active-nav" data-nav="game"><img src="assets/menu/game.png"></button>
        <button class="menu-btn" data-nav="zoo"><img src="assets/menu/zoo.png"></button>
        <button class="menu-btn" data-nav="shop"><img src="assets/menu/shop.png"></button>
        <button class="menu-btn" data-nav="missions"><img src="assets/menu/missions.png"></button>
        <button class="menu-btn" data-nav="minigames"><img src="assets/menu/minigames.png"></button>
        <button class="menu-btn" data-nav="ranking"><img src="assets/menu/ranking.png"></button>
    </footer>
</div>

<!-- PROFILE -->
<div id="profileModal" class="profile-modal hidden">
    <div class="profile-backdrop" id="profileBackdrop"></div>
    <div class="profile-card">
        <div class="profile-header">
            <div class="profile-avatar"></div>
            <div class="profile-user-meta">
                <div class="profile-name" id="profileName">Gracz</div>
                <div class="profile-subtitle" id="profileSubtitle">@username</div>
            </div>
        </div>
        <div class="profile-grid" id="profileGrid"></div>
        <button id="closeProfileBtn" class="profile-close-btn">Zamknij</button>
    </div>
</div>

<!-- SETTINGS LOAD -->
<div id="settingsModalMount"></div>

<!-- DAILY -->
<div id="dailyRewardModal" class="profile-modal hidden">
    <div class="profile-backdrop"></div>
    <div class="profile-card">
        <div class="profile-header">
            <div class="profile-avatar">🎁</div>
            <div class="profile-user-meta">
                <div class="profile-name">Daily Reward</div>
            </div>
        </div>
        <button id="closeDailyRewardBtn" class="profile-close-btn">Zamknij</button>
    </div>
</div>

<!-- SCRIPTS -->
<script src="./js/config.js"></script>
<script src="./js/state.js"></script>
<script src="./js/dom.js"></script>
<script src="./js/ui-profile.js"></script>
<script src="./js/ui-settings.js"></script>
<script src="./js/navigation-system.js"></script>
<script src="./js/ui.js"></script>
<script src="./js/api.js"></script>
<script src="./js/deposit-ui.js"></script>
<script src="./js/deposit-ui-bind.js"></script>
<script src="./js/telegram.js"></script>
<script src="./js/gameplay.js"></script>
<script src="./js/lang.js"></script>
<script src="./js/html-loader.js"></script>
<script src="./js/init.js"></script>

</body>
</html>
