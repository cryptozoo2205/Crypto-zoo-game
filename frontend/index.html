<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crypto Zoo</title>

    <link rel="stylesheet" href="./css/base.css">
    <link rel="stylesheet" href="./css/layout.css">
    <link rel="stylesheet" href="./css/game.css">
    <link rel="stylesheet" href="./css/zoo.css">
    <link rel="stylesheet" href="./css/shop.css">
    <link rel="stylesheet" href="./css/expeditions.css">
    <link rel="stylesheet" href="./css/ranking.css">
    <link rel="stylesheet" href="./css/menu.css">
    <link rel="stylesheet" href="./css/responsive.css">
</head>
<body>
    <div id="loading-screen">
        <div class="loading-inner">
            <div class="loading-logo-wrap">
                <div class="loading-logo-ring"></div>
                <div class="loading-logo-core">🐾</div>
            </div>

            <div class="loading-title">Crypto Zoo</div>
            <div class="loading-subtitle">Loading Zoo...</div>

            <div class="loading-bar">
                <div class="loading-bar-fill" id="loadingBarFill"></div>
            </div>

            <div class="loading-percent" id="loadingPercent">0%</div>
        </div>
    </div>

    <div id="app">
        <header class="top-bar">
            <h1>Crypto Zoo</h1>
            <div class="paw-row">🐾 🐾 🐾</div>

            <div class="stats-panel">
                <div class="stat-box">
                    <div class="stat-label">Coins</div>
                    <div class="stat-value" id="coins">0</div>
                </div>

                <div class="stat-box">
                    <div class="stat-label">Gems</div>
                    <div class="stat-value" id="gems">0</div>
                </div>

                <div class="stat-box">
                    <div class="stat-label">Reward</div>
                    <div class="stat-value" id="rewardBalance">0</div>
                </div>

                <div class="stat-box">
                    <div class="stat-label">Lvl</div>
                    <div class="stat-value" id="level">1</div>
                </div>

                <div class="stat-box">
                    <div class="stat-label">Za klik</div>
                    <div class="stat-value" id="coinsPerClick">1</div>
                </div>

                <div class="stat-box">
                    <div class="stat-label">Dochód / sek</div>
                    <div class="stat-value" id="zooIncome">0</div>
                </div>
            </div>
        </header>

        <main id="game">
            <section id="screen-game" class="screen">
                <div class="panel card game-main-card">
                    <h2>🪙 Game</h2>

                    <div class="tap-area">
                        <div class="tap-glow"></div>
                        <button id="tapButton" class="tap-button" type="button"></button>
                    </div>
                </div>
            </section>

            <section id="screen-zoo" class="screen hidden">
                <div class="panel card">
                    <h2>🐾 Zoo</h2>
                    <div id="zooList"></div>
                </div>
            </section>

            <section id="screen-shop" class="screen hidden">
                <div class="panel card">
                    <h2>🛒 Shop</h2>
                    <div id="shopList"></div>

                    <h3 style="margin-top: 20px;">🎁 Boxes</h3>
                    <div class="boxes" id="boxesBuyList">
                        <button data-box-type="common" type="button">
                            Common Box
                            <br>
                            1000 coins
                        </button>

                        <button data-box-type="rare" type="button">
                            Rare Box
                            <br>
                            5 gems
                        </button>

                        <button data-box-type="epic" type="button">
                            Epic Box
                            <br>
                            15 gems
                        </button>

                        <button data-box-type="legendary" type="button">
                            Legendary Box
                            <br>
                            40 gems
                        </button>
                    </div>

                    <h3 style="margin-top: 20px;">📦 Twoje boxy</h3>
                    <div id="boxesList"></div>
                </div>
            </section>

            <section id="screen-missions" class="screen hidden">
                <div class="panel card">
                    <h2>🌍 Expeditions</h2>
                    <div id="missionsList"></div>
                </div>
            </section>

            <section id="screen-minigames" class="screen hidden">
                <div class="panel card">
                    <h2>🎮 Mini Games</h2>

                    <div id="minigamesWrap">
                        <div id="wheelGame">
                            <h3>Wheel Of Fortune</h3>

                            <div style="position:relative; width:260px; height:260px; margin:0 auto 16px auto;">
                                <div id="wheelPointer" style="position:absolute; top:-8px; left:50%; transform:translateX(-50%); font-size:28px; z-index:2;">▼</div>

                                <div id="wheel" style="
                                    width:260px;
                                    height:260px;
                                    border-radius:50%;
                                    border:8px solid #fff;
                                    background:
                                    conic-gradient(
                                        #ffcc00 0deg 60deg,
                                        #4caf50 60deg 120deg,
                                        #03a9f4 120deg 180deg,
                                        #ff5722 180deg 240deg,
                                        #9c27b0 240deg 300deg,
                                        #8bc34a 300deg 360deg
                                    );
                                    transition: transform 4s cubic-bezier(0.15, 0.85, 0.15, 1);
                                    box-shadow:0 0 20px rgba(0,0,0,0.35);
                                    margin:0 auto;
                                "></div>
                            </div>

                            <button id="spinWheelBtn" type="button">Spin Wheel</button>
                            <p id="wheelRewardText"></p>
                        </div>

                        <div id="memoryGame">
                            <h3>Memory Animals</h3>

                            <div id="memoryBoard" style="
                                display:grid;
                                grid-template-columns:repeat(4, 70px);
                                gap:10px;
                                justify-content:center;
                                margin:16px auto;
                            "></div>

                            <button id="startMemoryBtn" type="button">Start Memory</button>
                            <p id="memoryStatus"></p>
                        </div>
                    </div>
                </div>
            </section>

            <section id="screen-ranking" class="screen hidden">
                <div class="panel card">
                    <h2>🏆 Ranking</h2>
                    <ul id="rankingList"></ul>
                </div>
            </section>
        </main>

        <footer class="menu">
            <button data-nav="game" type="button">Game</button>
            <button data-nav="zoo" type="button">Zoo</button>
            <button data-nav="shop" type="button">Shop</button>
            <button data-nav="missions" type="button">Missions</button>
            <button data-nav="minigames" type="button">Mini Games</button>
            <button data-nav="ranking" type="button">Ranking</button>
        </footer>
    </div>

    <script src="./js/config.js"></script>
    <script src="./js/state.js"></script>
    <script src="./js/dom.js"></script>
    <script src="./js/ui.js"></script>
    <script src="./js/api.js"></script>
    <script src="./js/telegram.js"></script>
    <script src="./js/shop.js"></script>
    <script src="./js/boxes.js"></script>
    <script src="./js/minigames.js"></script>
    <script src="./js/gameplay.js"></script>
    <script src="./js/init.js"></script>
</body>
</html>
